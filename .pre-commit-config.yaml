repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        name: ruff (src strict)
        files: ^src/
        args: [ "--fix", "src" ]
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff-format (all)
        types: [ python ]
        pass_filenames: false
        always_run: true