name: Docker Image CI

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build Dashboard container image
        run: |
          docker build . --file Dockerfile --tag ghcr.io/aalex92-dev/dashboard:latest

      - name: Run tests with docker compose
        run: |
          docker compose -f tests/test.docker-compose.yml up --build --exit-code-from tests
          docker compose -f tests/test.docker-compose.yml down

      - name: Push container image
        if: success()
        run: |
          docker push ghcr.io/aalex92-dev/dashboard:latest
