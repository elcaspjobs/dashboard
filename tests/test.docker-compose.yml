version: '3.8'

services:
  test_dashboard:
    container_name: test_dashboard
    build: ../.
    env_file:
      - ../.env
    command: sh -c "python src/main.py"
    volumes:
      - ../.:/usr/src/app
      - dashboard_logs:/usr/src/app/logs/dashboard
    depends_on:
      - test_db

  test_db:
    container_name: test_db
    image: postgres:latest
    env_file:
      - ../.env
    volumes:
      - ../.:/usr/src/app
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_dashboard_db
    healthcheck:
      test: ["CMD-SHELL", "pg_is_ready -U admin -d test_dashboard_db"]
      interval: 3s
      timeout: 5s
      retries: 3
    ports:
      - 5432:5432
    restart: always

  test_rabbitmq:
    container_name: test_rabbitmq
    image: rabbitmq:latest
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-quest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 5s
      timeout: 10s
      retries: 5
    env_file:
      - ../.env

  tests:
    container_name: tests
    env_file:
      - ../.env
    build:
      context: ../.
    volumes:
      - ../.:/usr/src/app
    entrypoint: >
      sh -c "
      while ! nc -z test_db 5432; do sleep 1; done && 
      pytest tests/src/
      "
    depends_on:
      - test_db

volumes:
  rabbitmq_data:
  postgres_data:
  dashboard_logs:



